name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # APK 构建可能需要较长时间

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3-pip \
            zip unzip \
            autoconf automake libtool \
            libltdl-dev libffi-dev libssl-dev \
            libncurses5-dev

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: 'platform-tools platforms;android-33 build-tools;33.0.0 ndk;25.1.8937393'
          accept-license: true

      - name: Accept Android SDK licenses
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          mkdir -p $ANDROID_HOME/cmdline-tools
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          # Buildozer 使用旧版 tools/bin/sdkmanager 路径，下载并放置到该路径
          mkdir -p /tmp/android-tools
          cd /tmp/android-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p $ANDROID_HOME/tools
          mv cmdline-tools/* $ANDROID_HOME/tools/
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          ls -la $ANDROID_HOME/tools/bin/sdkmanager

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --upgrade Cython==0.29.37 buildozer

      - name: Build APK with Buildozer
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          buildozer -v android debug > buildozer.log 2>&1
          EXIT_CODE=$?
          echo "Buildozer exit code: $EXIT_CODE"
          echo "=== BUILD LAST 300 LINES ==="
          tail -n 300 buildozer.log
          exit $EXIT_CODE

      - name: List built APKs
        run: |
          echo "=== Built APKs ==="
          ls -lh bin/ 2>/dev/null || echo "No APKs found in bin/"
          find . -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null || echo "No APK files found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 通信网络题库答题系统
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/dists/*/bin/*.apk
            buildozer.log
          retention-days: 30
